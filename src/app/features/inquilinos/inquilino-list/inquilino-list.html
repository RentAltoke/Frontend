<h2>Inquilinos</h2>
<button routerLink="/inquilinos/nuevo" class="btn-add">
  Nuevo Inquilino
</button>

<div class="grid-container">
  <div class="card" *ngFor="let inq of inquilinos">
    <div class="image-container">
      <span class="tipo-badge">{{ inq.tipo_persona }}</span>
      <img [src]="'inquilinos/' + inq.id + '.jpg'" 
           [alt]="inq.datos_personales.nombre_completo">
    </div>
    
    <div class="info">
      <h3>{{ inq.datos_personales.nombre_completo }}</h3>
      <p class="email">{{ inq.datos_personales.email }}</p>
      
      <div class="detalles-pago">
        <div class="dato">
          <span class="label">Renta</span>
          <span class="valor">{{ inq.contrato.monto_renta_pactado | currency:'PEN':'S/ ' }}</span>
        </div>
        <div class="dato">
          <span class="label">Unidad</span>
          <span class="valor">{{ inq.contrato.id_unidad_alquilada }}</span>
        </div>
      </div>
      
      <p><strong>DNI:</strong> {{ inq.datos_personales.documento_identidad }}</p>
    </div>

    <button class="btn-contacto">Movimientos bancarios (Ingresos/Gastos)</button>
  </div>
</div>
